name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMKD_BUILD_CLI=ON -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Run mkd-tools (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir output
          .\build\cli\Release\mkd-tools.exe -d .\test\test-data -e TESTDICT -o output --keystore-mode both --overwrite --pretty

      - name: Run mkd-tools (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir output
          ./build/cli/mkd-tools -d ./test/test-data -e TESTDICT -o output --keystore-mode both --overwrite --pretty

      - name: Verify exported CI fixtures
        run: python test/ci/verify_fixture_export.py output

      - name: List output files
        if: always()
        shell: bash
        run: find output -type f | sort
